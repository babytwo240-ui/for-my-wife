<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Access</title>
    <style>
        body {
            background-color: black;
            color: #00FF41;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #terminal {
            width: 90%;
            max-width: 600px;
            font-size: 12px;
            white-space: pre;
            line-height: 8px;
            letter-spacing: 2px;
        }

        #overlay-text {
            position: absolute;
            top: 20%;
            text-align: center;
            font-size: 1.5rem;
            text-shadow: 0 0 10px #00FF41;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
        }

        #logs {
            font-size: 14px;
            margin-bottom: 20px;
        }

        video, canvas {
            display: none;
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 15px;
            background: #00FF41;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="logs"></div>
    <div id="terminal"></div>
    <div id="overlay-text" style="display: none;">TARGET ACQUIRED: THE MOST BEAUTIFUL GIRL IN THE WORLD <br><br> ❤️ I LOVE YOU ❤️</div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const terminal = document.getElementById('terminal');
        const logs = document.getElementById('logs');
        const overlay = document.getElementById('overlay-text');

        const width = 60; // Resolution of binary characters
        const height = 45;

        const messages = [
            "> Initializing Heart.exe...",
            "> Searching for lifeform on network...",
            "> Connection established...",
            "> Accessing front camera...",
            "> Analyzing beauty levels...",
            "> CRITICAL ERROR: Beauty levels off the charts!",
            "> Visualizing subject..."
        ];

        async function init() {
            // Typewriter effect for logs
            for (let msg of messages) {
                let div = document.createElement('div');
                logs.appendChild(div);
                for (let char of msg) {
                    div.innerHTML += char;
                    await new Promise(r => setTimeout(r, 40));
                }
                await new Promise(r => setTimeout(r, 500));
            }

            startCamera();
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
                video.play();
                
                // Once video starts, begin the conversion
                video.onloadeddata = () => {
                    setInterval(renderFrame, 80);
                    setTimeout(() => {
                        overlay.style.display = 'block';
                    }, 3000);
                };
            } catch (err) {
                logs.innerHTML = "> Access Denied. (Please enable camera to proceed)";
            }
        }

        function renderFrame() {
            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(video, 0, 0, width, height);

            const pixels = ctx.getImageData(0, 0, width, height).data;
            let binaryImage = "";

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const index = (y * width + x) * 4;
                    const r = pixels[index];
                    const g = pixels[index + 1];
                    const b = pixels[index + 2];
                    
                    // Simple brightness calculation
                    const brightness = (r + g + b) / 3;
                    
                    // Convert brightness to 0 or 1 (or other chars)
                    // High brightness = 1, Low = 0
                    binaryImage += brightness > 100 ? "1" : "0";
                }
                binaryImage += "\n";
            }
            terminal.innerText = binaryImage;
        }

        init();
    </script>
</body>
</html>
